<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <script type="module" defer src="/src/js/main.js"></script>
    <title>TrailExplorer</title>
  </head>
  <body>
    <main>
      <div class="hero-image">
        <div class="hero-text"><h1>TRAIL EXPLORER</h1></div>
      </div>
      <div>
        <div>
          <h2>Discover:</h2>
          <form action="#">
            <input type="text" placeholder="Search For New Hikes" name="search">
            <button>
              <svg width="16" height="16" viewBox="0 0 24 24">
              <path d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
              stroke="currentColor" fill="none" stroke-width="2"/>
              </svg>
            </button>
          </form>
          <div>
            <div id="hikeCards" class="cards-container"></div>
          </div>
        </div>
        <div>
          <h2>Favorites:</h2>
          <form action="#">
            <input type="text" placeholder="Search Through Your Favorites" name="search">
            <button>
              <svg width="16" height="16" viewBox="0 0 24 24">
              <path d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
              stroke="currentColor" fill="none" stroke-width="2"/>
              </svg>
            </button>
          </form>
        </div>
      </div>
      <div id="favoriteTrails" class="cards-container"></div>
      
      <!-- PLAN YOUR HIKE MODAL -->
      <section id="hikeModal" class="modal-overlay hidden">
        <div class="modal-content">
          <button id="closeModalBtn" class="close-btn">&times;</button>
          
          <!-- Form State -->
          <form id="planHikeForm">
            <h2>Plan Your Hike</h2>
            <p>Select a trail to email the details to yourself.</p>
            
            <label for="modalTrailSelect">Selected Trail:</label>
            <input type="text" id="modalTrailSelect" readonly>

            <label for="userName">Name *</label>
            <input type="text" id="userName" required placeholder="Your full name">

            <label for="userEmail">Email *</label>
            <input type="email" id="userEmail" required placeholder="yourname@example.com">

            <label for="userNotes">Optional Notes</label>
            <textarea id="userNotes" rows="4" placeholder="Any gear reminders, dates, or safety notes..."></textarea>

            <button type="submit" class="submit-btn">Email Me My Hike Plan</button>
          </form>

          <!-- Success Confirmation State -->
          <div id="modalConfirmation" class="hidden">
            <h2>🎉 Hike Planned Successfully!</h2>
            <p>Your itinerary has been sent to your email.</p>
            <blockquote id="confirmationDetails">
              <!-- Dynamically populated via JS -->
            </blockquote>
            <button id="confirmCloseBtn" class="submit-btn">Back to Exploring</button>
          </div>
        </div>
      </section>

      <footer></footer>
    </main>
  </body>
</html>
